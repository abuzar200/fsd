<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 8: Auth Token Storage Simulation</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        h2 { color: #2c3e50; margin-top: 0; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: #7f8c8d; font-size: 0.9rem; }
        input {
            width: 100%; padding: 12px; border: 2px solid #ecf0f1; 
            border-radius: 8px; box-sizing: border-box; font-family: inherit;
        }
        input:focus { outline: none; border-color: #3498db; }
        button {
            width: 100%; padding: 14px; background: #3498db; color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #2980b9; }
        
        /* Dashboard view */
        #dashboard { display: none; }
        .token-display {
            background: #f8f9fa; padding: 15px; border-radius: 8px;
            margin-bottom: 20px; word-break: break-all; font-family: monospace;
            font-size: 0.85rem; color: #e74c3c; border: 1px dashed #bdc3c7;
        }
        .logout-btn { background: #e74c3c; }
        .logout-btn:hover { background: #c0392b; }
    </style>
</head>
<body>

    <div class="auth-container" id="loginView">
        <h2>🔒 Login Simulation</h2>
        <p style="color: #7f8c8d; font-size: 0.9em; margin-bottom: 30px;">
            Simulating JSON Web Token (JWT) storage.
        </p>
        
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter 'admin'">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter 'password'">
        </div>
        <button onclick="handleLogin()">Login & Save Token</button>
        <div id="errorMsg" style="color: #e74c3c; margin-top: 15px; font-size: 0.9em; display: none;">Invalid credentials</div>
    </div>

    <div class="auth-container" id="dashboard">
        <h2>✅ Welcome Back!</h2>
        <p>You are authenticated.</p>
        
        <div style="text-align: left; margin-bottom: 5px;">
            <label>Your Simulated Token (from LocalStorage):</label>
        </div>
        <div class="token-display" id="tokenViewer"></div>
        
        <button class="logout-btn" onclick="handleLogout()">Logout & Clear Token</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
